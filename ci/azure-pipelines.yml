# Azure Pipeline for net-questdb-client
# Triggers on pull requests to main branch

trigger: none

pr:
  branches:
    include:
      - main

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '9.0.x'

strategy:
  matrix:
    Linux:
      vmImage: 'ubuntu-latest'
      osName: 'Linux'
    Windows:
      vmImage: 'windows-latest'
      osName: 'Windows'
    macOS:
      vmImage: 'macOS-latest'
      osName: 'macOS'

pool:
  vmImage: $(vmImage)

steps:
- checkout: self
  submodules: true
  displayName: 'Checkout code with submodules'

- task: UseDotNet@2
  displayName: 'Install .NET 6.0 SDK'
  inputs:
    packageType: 'sdk'
    version: '6.0.x'
    installationPath: $(Agent.ToolsDirectory)/dotnet

- task: UseDotNet@2
  displayName: 'Install .NET 7.0 SDK'
  inputs:
    packageType: 'sdk'
    version: '7.0.x'
    installationPath: $(Agent.ToolsDirectory)/dotnet

- task: UseDotNet@2
  displayName: 'Install .NET 8.0 SDK'
  inputs:
    packageType: 'sdk'
    version: '8.0.x'
    installationPath: $(Agent.ToolsDirectory)/dotnet

- task: UseDotNet@2
  displayName: 'Install .NET 9.0 SDK'
  inputs:
    packageType: 'sdk'
    version: $(dotnetVersion)
    installationPath: $(Agent.ToolsDirectory)/dotnet

- task: UseDotNet@2
  displayName: 'Install .NET 10.0 SDK'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'
    installationPath: $(Agent.ToolsDirectory)/dotnet

- task: JavaToolInstaller@0
  displayName: 'Install JDK 17 (to build QuestDB)'
  inputs:
    versionSpec: '17'
    jdkArchitectureOption: 'x64'
    jdkSourceOption: 'PreInstalled'
  condition: eq(variables['osName'], 'Linux')

- script: |
    set -e
    git clone --depth 1 https://github.com/questdb/questdb.git questdb-src
    cd questdb-src
    mvn -q -pl core -am -DskipTests -P build-binaries package
    echo "##vso[task.setvariable variable=QUESTDB_REPO]$(pwd)"
  displayName: 'Clone + build QuestDB master'
  condition: eq(variables['osName'], 'Linux')

- task: DotNetCoreCLI@2
  displayName: 'Restore dependencies'
  inputs:
    command: 'restore'
    projects: 'net-questdb-client.sln'

- task: DotNetCoreCLI@2
  displayName: 'Build solution'
  inputs:
    command: 'build'
    projects: 'net-questdb-client.sln'
    arguments: '--configuration $(buildConfiguration) --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'Run all tests on $(osName) (net8.0)'
  inputs:
    command: 'test'
    projects: 'src/net-questdb-client-tests/net-questdb-client-tests.csproj'
    arguments: '--configuration $(buildConfiguration) --framework net8.0 --no-build --verbosity normal --logger trx --blame-hang --blame-hang-timeout 120s --blame-hang-dump-type mini --filter "FullyQualifiedName!~QuestDbIntegrationTests&FullyQualifiedName!~QuestDbWebSocketIntegrationTests&FullyQualifiedName!~QuestDbQueryIntegrationTests"'
    publishTestResults: true

- task: DotNetCoreCLI@2
  displayName: 'Run all tests on $(osName) (net9.0, with coverage)'
  inputs:
    command: 'test'
    projects: 'src/net-questdb-client-tests/net-questdb-client-tests.csproj'
    arguments: '--configuration $(buildConfiguration) --framework net9.0 --no-build --verbosity normal --logger trx --blame-hang --blame-hang-timeout 120s --blame-hang-dump-type mini --collect:"XPlat Code Coverage"'
    publishTestResults: true
  env:
    QUESTDB_REPO: $(QUESTDB_REPO)
  condition: eq(variables['osName'], 'Linux')

- task: DotNetCoreCLI@2
  displayName: 'Run tests on $(osName) (net9.0, excluding integration tests)'
  inputs:
    command: 'test'
    projects: 'src/net-questdb-client-tests/net-questdb-client-tests.csproj'
    arguments: '--configuration $(buildConfiguration) --framework net9.0 --no-build --verbosity normal --logger trx --blame-hang --blame-hang-timeout 120s --blame-hang-dump-type mini --collect:"XPlat Code Coverage" --filter "FullyQualifiedName!~QuestDbIntegrationTests&FullyQualifiedName!~QuestDbWebSocketIntegrationTests&FullyQualifiedName!~QuestDbQueryIntegrationTests"'
    publishTestResults: true
  condition: ne(variables['osName'], 'Linux')

- task: DotNetCoreCLI@2
  displayName: 'Run all tests on $(osName) (net10.0)'
  inputs:
    command: 'test'
    projects: 'src/net-questdb-client-tests/net-questdb-client-tests.csproj'
    arguments: '--configuration $(buildConfiguration) --framework net10.0 --no-build --verbosity normal --logger trx --blame-hang --blame-hang-timeout 120s --blame-hang-dump-type mini --filter "FullyQualifiedName!~QuestDbIntegrationTests&FullyQualifiedName!~QuestDbWebSocketIntegrationTests&FullyQualifiedName!~QuestDbQueryIntegrationTests"'
    publishTestResults: true

- task: CopyFiles@2
  displayName: 'Stage hang dumps + trx ($(osName))'
  condition: always()
  inputs:
    sourceFolder: '$(Agent.TempDirectory)'
    contents: |
      **/*.dmp
      **/*Sequence*.xml
      **/*.trx
    targetFolder: '$(Build.ArtifactStagingDirectory)/TestArtifacts'

- task: PublishPipelineArtifact@1
  displayName: 'Publish hang dumps + trx ($(osName))'
  condition: always()
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)/TestArtifacts'
    artifact: 'TestArtifacts-$(osName)-$(Build.BuildId)'
    publishLocation: 'pipeline'

- task: PublishCodeCoverageResults@2
  displayName: 'Publish code coverage'
  inputs:
    summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'
    codecoverageTool: 'cobertura'
  condition: succeededOrFailed()
